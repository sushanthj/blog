---
layout: default
dark_theme: true
---

<div class="kb">

	<section class="kb-hero">
		<div class="kb-wrap">
			<h1 class="kb-hero__title">{{ page.title }}</h1>
			<p class="kb-hero__subtitle">{{ page.subtitle }}</p>
		</div>
	</section>

	<section class="kb-section">
		<div class="kb-wrap">
			<div class="kb-grid">
				{% for post in site.posts %}
				{% if post.categories contains 'projects' %}
				<a class="kb-card" href="{{ post.url | relative_url }}">
					<div class="kb-card__image">
						<img src="{{ post.featured_image | relative_url }}" alt="{{ post.title }}">
					</div>
					<div class="kb-card__body">
						<span class="kb-card__category">Project</span>
						<h3 class="kb-card__title">{{ post.title }}</h3>
						<p class="kb-card__subtitle">{{ post.subtitle }}</p>
						<span class="kb-card__date">{{ post.date | date: "%b %d, %Y" }}</span>
					</div>
				</a>
				{% endif %}
				{% endfor %}
			</div>
		</div>
	</section>

</div>
