<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#1e1e2e"/>

  <!-- Game Screen box -->
  <rect x="30" y="105" width="160" height="140" rx="12" ry="12" fill="none" stroke="#89b4fa" stroke-width="2"/>
  <text x="110" y="140" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold">Game Screen</text>

  <!-- Pacman icon: yellow circle with wedge cut out (mouth opens right) -->
  <path d="M 110,200 L 138,183 A 32,32 0 1 0 138,217 Z" fill="#f9e2af"/>
  <!-- Pacman eye -->
  <circle cx="115" cy="188" r="3" fill="#1e1e2e"/>

  <!-- Small dots for pacman food -->
  <circle cx="68" cy="200" r="3.5" fill="#f9e2af"/>
  <circle cx="78" cy="222" r="3.5" fill="#f9e2af"/>
  <circle cx="62" cy="182" r="3.5" fill="#f9e2af"/>

  <!-- Arrow from Game Screen to NN -->
  <line x1="195" y1="175" x2="263" y2="175" stroke="#585b70" stroke-width="2"/>
  <polygon points="263,170 273,175 263,180" fill="#585b70"/>

  <!-- Connections: Input to Hidden -->
  <g stroke="#585b70" stroke-width="0.7" opacity="0.4">
    <line x1="308" y1="115" x2="382" y2="75"/>
    <line x1="308" y1="115" x2="382" y2="125"/>
    <line x1="308" y1="115" x2="382" y2="175"/>
    <line x1="308" y1="115" x2="382" y2="225"/>
    <line x1="308" y1="115" x2="382" y2="275"/>
    <line x1="308" y1="175" x2="382" y2="75"/>
    <line x1="308" y1="175" x2="382" y2="125"/>
    <line x1="308" y1="175" x2="382" y2="175"/>
    <line x1="308" y1="175" x2="382" y2="225"/>
    <line x1="308" y1="175" x2="382" y2="275"/>
    <line x1="308" y1="235" x2="382" y2="75"/>
    <line x1="308" y1="235" x2="382" y2="125"/>
    <line x1="308" y1="235" x2="382" y2="175"/>
    <line x1="308" y1="235" x2="382" y2="225"/>
    <line x1="308" y1="235" x2="382" y2="275"/>
  </g>

  <!-- Connections: Hidden to Output -->
  <g stroke="#585b70" stroke-width="0.7" opacity="0.4">
    <line x1="408" y1="75" x2="482" y2="145"/>
    <line x1="408" y1="75" x2="482" y2="205"/>
    <line x1="408" y1="125" x2="482" y2="145"/>
    <line x1="408" y1="125" x2="482" y2="205"/>
    <line x1="408" y1="175" x2="482" y2="145"/>
    <line x1="408" y1="175" x2="482" y2="205"/>
    <line x1="408" y1="225" x2="482" y2="145"/>
    <line x1="408" y1="225" x2="482" y2="205"/>
    <line x1="408" y1="275" x2="482" y2="145"/>
    <line x1="408" y1="275" x2="482" y2="205"/>
  </g>

  <!-- Input layer (3 nodes) x=295 -->
  <circle cx="295" cy="115" r="13" fill="rgba(137,180,250,0.2)" stroke="#89b4fa" stroke-width="2"/>
  <circle cx="295" cy="175" r="13" fill="rgba(137,180,250,0.2)" stroke="#89b4fa" stroke-width="2"/>
  <circle cx="295" cy="235" r="13" fill="rgba(137,180,250,0.2)" stroke="#89b4fa" stroke-width="2"/>

  <!-- Hidden layer (5 nodes) x=395 -->
  <circle cx="395" cy="75" r="13" fill="rgba(88,91,112,0.3)" stroke="#585b70" stroke-width="2"/>
  <circle cx="395" cy="125" r="13" fill="rgba(88,91,112,0.3)" stroke="#585b70" stroke-width="2"/>
  <circle cx="395" cy="175" r="13" fill="rgba(88,91,112,0.3)" stroke="#585b70" stroke-width="2"/>
  <circle cx="395" cy="225" r="13" fill="rgba(88,91,112,0.3)" stroke="#585b70" stroke-width="2"/>
  <circle cx="395" cy="275" r="13" fill="rgba(88,91,112,0.3)" stroke="#585b70" stroke-width="2"/>

  <!-- Output layer (2 nodes) x=495 -->
  <circle cx="495" cy="145" r="13" fill="rgba(166,227,161,0.2)" stroke="#a6e3a1" stroke-width="2"/>
  <circle cx="495" cy="205" r="13" fill="rgba(166,227,161,0.2)" stroke="#a6e3a1" stroke-width="2"/>

  <!-- NN Label -->
  <text x="395" y="330" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold">Policy &#x03C0;&#x03B8;</text>

  <!-- Arrow from NN to bar chart -->
  <line x1="512" y1="175" x2="580" y2="175" stroke="#585b70" stroke-width="2"/>
  <polygon points="580,170 590,175 580,180" fill="#585b70"/>

  <!-- Bar chart: P(action) -->
  <!-- Title -->
  <text x="735" y="62" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold">P(action)</text>

  <!-- Bars: base y=280, max height for 0.5 = 195px -->
  <!-- Bar 1: up, prob 0.5, height=195 -->
  <rect x="615" y="85" width="45" height="195" rx="3" ry="3" fill="#a6e3a1" opacity="0.8"/>
  <text x="637" y="77" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="14">0.5</text>

  <!-- Bar 2: down, prob 0.2, height=78 -->
  <rect x="675" y="202" width="45" height="78" rx="3" ry="3" fill="#a6e3a1" opacity="0.8"/>
  <text x="697" y="194" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="14">0.2</text>

  <!-- Bar 3: left, prob 0.1, height=39 -->
  <rect x="735" y="241" width="45" height="39" rx="3" ry="3" fill="#a6e3a1" opacity="0.8"/>
  <text x="757" y="233" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="14">0.1</text>

  <!-- Bar 4: right, prob 0.2, height=78 -->
  <rect x="795" y="202" width="45" height="78" rx="3" ry="3" fill="#a6e3a1" opacity="0.8"/>
  <text x="817" y="194" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="14">0.2</text>

  <!-- X-axis line -->
  <line x1="605" y1="280" x2="850" y2="280" stroke="#585b70" stroke-width="2"/>

  <!-- Arrow labels below bars -->
  <text x="637" y="308" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="22">&#x2191;</text>
  <text x="697" y="308" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="22">&#x2193;</text>
  <text x="757" y="308" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="22">&#x2190;</text>
  <text x="817" y="308" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="22">&#x2192;</text>
</svg>
