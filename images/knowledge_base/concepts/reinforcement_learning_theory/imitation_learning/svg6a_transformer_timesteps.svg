  <rect x="244" y="76" width="36" height="8" fill="#89b4fa" fill-opacity="0.10"/>
  <rect x="244" y="86" width="36" height="8" fill="#89b4fa" fill-opacity="0.15"/>
  <rect x="244" y="96" width="36" height="8" fill="#89b4fa" fill-opacity="0.30"/>
  <rect x="244" y="106" width="36" height="8" fill="#89b4fa" fill-opacity="0.55"/>
  <rect x="244" y="116" width="36" height="8" fill="#89b4fa" fill-opacity="0.80"/>
  <rect x="244" y="126" width="36" height="8" fill="#89b4fa" fill-opacity="0.50"/>
  <rect x="244" y="136" width="36" height="8" fill="#89b4fa" fill-opacity="0.20"/>
  <rect x="244" y="146" width="36" height="8" fill="#89b4fa" fill-opacity="0.10"/>
  <rect x="244" y="156" width="36" height="8" fill="#89b4fa" fill-opacity="0.08"/>
