<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#1e1e2e"/>

  <!-- ========== Transformer Model (left) ========== -->

  <!-- Transformer box -->
  <rect x="30" y="110" width="130" height="105" rx="12" ry="12" fill="rgba(166,227,161,0.12)" stroke="#a6e3a1" stroke-width="2"/>
  <text x="95" y="153" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold">Transformer</text>
  <text x="95" y="175" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="13">Model</text>
  <text x="95" y="200" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="22">&#x3C0;&#x3B8;</text>

  <!-- Robot State input -->
  <rect x="40" y="270" width="110" height="36" rx="8" ry="8" fill="rgba(249,226,175,0.15)" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="95" y="293" text-anchor="middle" fill="#f9e2af" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">Robot State</text>

  <!-- Arrow: State -> Transformer -->
  <line x1="95" y1="270" x2="95" y2="220" stroke="#585b70" stroke-width="1.8"/>
  <polygon points="90,222 95,215 100,222" fill="#585b70"/>

  <!-- Arrow: Transformer -> outputs -->
  <line x1="160" y1="160" x2="210" y2="160" stroke="#585b70" stroke-width="1.8"/>
  <polygon points="208,155 218,160 208,165" fill="#585b70"/>

  <!-- ========== Multiple Timestep Outputs ========== -->

  <!-- Timestep 1 -->
