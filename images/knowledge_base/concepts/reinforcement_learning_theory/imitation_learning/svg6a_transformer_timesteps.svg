  <rect x="575" y="179" width="50" height="12" fill="#f9e2af" fill-opacity="0.12"/>
  <rect x="575" y="193" width="50" height="12" fill="#f9e2af" fill-opacity="0.30"/>
  <rect x="575" y="207" width="50" height="12" fill="#f9e2af" fill-opacity="0.60"/>
  <rect x="575" y="221" width="50" height="12" fill="#f9e2af" fill-opacity="0.85"/>
  <rect x="575" y="235" width="50" height="12" fill="#f9e2af" fill-opacity="0.55"/>
  <rect x="575" y="249" width="50" height="12" fill="#f9e2af" fill-opacity="0.22"/>
  <rect x="575" y="263" width="50" height="12" fill="#f9e2af" fill-opacity="0.10"/>
  <rect x="575" y="277" width="50" height="12" fill="#f9e2af" fill-opacity="0.05"/>

  <!-- Bin labels -->
  <text x="560" y="77" text-anchor="end" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="9">bin 1</text>
  <text x="560" y="178" text-anchor="end" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="9">bin 15</text>
  <text x="560" y="287" text-anchor="end" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="9">bin 30</text>

  <!-- Brace for vocab_size -->
  <path d="M635,62 C640,62 642,64 642,69 L642,165 C642,170 644,172 649,172 C644,172 642,174 642,179 L642,287 C642,292 640,294 635,294" fill="none" stroke="#f9e2af" stroke-width="1.2"/>
  <text x="660" y="168" fill="#f9e2af" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">vocab_size</text>
  <text x="660" y="183" fill="#f9e2af" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">= 30</text>

  <!-- LLM comparison -->
  <text x="660" y="210" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10">(LLMs use</text>
  <text x="660" y="222" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10">~30,000!)</text>

  <!-- Feedback arrows between timesteps -->
  <path d="M275,248 C275,280 320,280 320,248" fill="none" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="317,250 320,243 323,250" fill="#f38ba8"/>
  <text x="298" y="292" text-anchor="middle" fill="#f38ba8" font-family="Arial, Helvetica, sans-serif" font-size="9">feed a&#x2081;</text>

  <path d="M345,248 C345,275 390,275 390,248" fill="none" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="387,250 390,243 393,250" fill="#f38ba8"/>

  <!-- Caption -->
  <text x="400" y="340" text-anchor="middle" fill="#a6adc8" font-family="Arial, Helvetica, sans-serif" font-size="12">Autoregressive: each timestep outputs a probability vector over discretized bins</text>
  <text x="400" y="360" text-anchor="middle" fill="#a6adc8" font-family="Arial, Helvetica, sans-serif" font-size="12">Each action conditioned on all previous: P(a&#x2082;|s,a&#x2081;), P(a&#x2083;|s,a&#x2081;,a&#x2082;), ...</text>
</svg>
