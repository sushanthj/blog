  <rect x="314" y="156" width="36" height="8" fill="#89b4fa" fill-opacity="0.12"/>
  <rect x="314" y="166" width="36" height="8" fill="#89b4fa" fill-opacity="0.25"/>
  <rect x="314" y="176" width="36" height="8" fill="#89b4fa" fill-opacity="0.50"/>
  <rect x="314" y="186" width="36" height="8" fill="#89b4fa" fill-opacity="0.80"/>
  <rect x="314" y="196" width="36" height="8" fill="#89b4fa" fill-opacity="0.65"/>
  <rect x="314" y="206" width="36" height="8" fill="#89b4fa" fill-opacity="0.30"/>
  <rect x="314" y="216" width="36" height="8" fill="#89b4fa" fill-opacity="0.12"/>
  <rect x="314" y="226" width="36" height="8" fill="#89b4fa" fill-opacity="0.06"/>
  <text x="332" y="255" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10">P(a&#x2082;|s,a&#x2081;)</text>

  <!-- Timestep 3 -->
  <text x="402" y="60" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">t=3</text>
  <rect x="380" y="72" width="44" height="175" rx="4" ry="4" fill="rgba(137,180,250,0.06)" stroke="#89b4fa" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="384" y="76" width="36" height="8" fill="#89b4fa" fill-opacity="0.08"/>
  <rect x="384" y="86" width="36" height="8" fill="#89b4fa" fill-opacity="0.18"/>
  <rect x="384" y="96" width="36" height="8" fill="#89b4fa" fill-opacity="0.40"/>
  <rect x="384" y="106" width="36" height="8" fill="#89b4fa" fill-opacity="0.70"/>
  <rect x="384" y="116" width="36" height="8" fill="#89b4fa" fill-opacity="0.90"/>
  <rect x="384" y="126" width="36" height="8" fill="#89b4fa" fill-opacity="0.55"/>
  <rect x="384" y="136" width="36" height="8" fill="#89b4fa" fill-opacity="0.22"/>
  <rect x="384" y="146" width="36" height="8" fill="#89b4fa" fill-opacity="0.10"/>
  <rect x="384" y="156" width="36" height="8" fill="#89b4fa" fill-opacity="0.08"/>
  <rect x="384" y="166" width="36" height="8" fill="#89b4fa" fill-opacity="0.18"/>
  <rect x="384" y="176" width="36" height="8" fill="#89b4fa" fill-opacity="0.40"/>
  <rect x="384" y="186" width="36" height="8" fill="#89b4fa" fill-opacity="0.65"/>
  <rect x="384" y="196" width="36" height="8" fill="#89b4fa" fill-opacity="0.50"/>
  <rect x="384" y="206" width="36" height="8" fill="#89b4fa" fill-opacity="0.20"/>
  <rect x="384" y="216" width="36" height="8" fill="#89b4fa" fill-opacity="0.08"/>
  <rect x="384" y="226" width="36" height="8" fill="#89b4fa" fill-opacity="0.05"/>
  <text x="402" y="255" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10">P(a&#x2083;|s,a&#x2081;,a&#x2082;)</text>

  <!-- Dots for more timesteps -->
  <text x="455" y="165" fill="#585b70" font-family="Arial, Helvetica, sans-serif" font-size="24">...</text>

  <!-- Brace over all timesteps -->
  <path d="M238,48 C238,42 240,40 246,40 L380,40 C386,40 388,38 388,32 C388,38 390,40 396,40 L460,40 C466,40 468,42 468,48" fill="none" stroke="#585b70" stroke-width="1.2"/>
  <text x="353" y="30" text-anchor="middle" fill="#585b70" font-family="Arial, Helvetica, sans-serif" font-size="11">output at each timestep</text>

  <!-- ========== Zoom arrow to detailed view ========== -->
  <line x1="475" y1="160" x2="510" y2="160" stroke="#f9e2af" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="508,155 518,160 508,165" fill="#f9e2af"/>
  <text x="495" y="145" text-anchor="middle" fill="#f9e2af" font-family="Arial, Helvetica, sans-serif" font-size="10">zoom</text>

  <!-- ========== Zoomed single timestep (right) ========== -->
  <text x="600" y="48" text-anchor="middle" fill="#f9e2af" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">Single timestep output</text>

  <!-- Larger bin column -->
  <rect x="570" y="62" width="60" height="232" rx="5" ry="5" fill="rgba(249,226,175,0.06)" stroke="#f9e2af" stroke-width="1.5"/>

  <!-- 16 representative bins with bimodal opacity -->
  <rect x="575" y="67" width="50" height="12" fill="#f9e2af" fill-opacity="0.08"/>
  <rect x="575" y="81" width="50" height="12" fill="#f9e2af" fill-opacity="0.15"/>
  <rect x="575" y="95" width="50" height="12" fill="#f9e2af" fill-opacity="0.35"/>
  <rect x="575" y="109" width="50" height="12" fill="#f9e2af" fill-opacity="0.65"/>
  <rect x="575" y="123" width="50" height="12" fill="#f9e2af" fill-opacity="0.85"/>
  <rect x="575" y="137" width="50" height="12" fill="#f9e2af" fill-opacity="0.50"/>
  <rect x="575" y="151" width="50" height="12" fill="#f9e2af" fill-opacity="0.18"/>
