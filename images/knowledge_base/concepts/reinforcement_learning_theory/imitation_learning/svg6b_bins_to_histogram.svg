  <rect x="320" y="360" width="14" height="10" fill="#89b4fa" fill-opacity="0.7"/>
  <text x="340" y="369" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10">Bin probabilities (model output)</text>
