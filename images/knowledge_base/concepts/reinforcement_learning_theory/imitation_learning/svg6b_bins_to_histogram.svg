  <rect x="468.3" y="296" width="16.7" height="14" fill="#89b4fa" fill-opacity="0.3"/>
  <rect x="486" y="286" width="16.7" height="24" fill="#89b4fa" fill-opacity="0.4"/>
  <rect x="503.7" y="265" width="16.7" height="45" fill="#89b4fa" fill-opacity="0.5"/>
  <rect x="521.3" y="238" width="16.7" height="72" fill="#89b4fa" fill-opacity="0.6"/>
  <rect x="539" y="200" width="16.7" height="110" fill="#89b4fa" fill-opacity="0.7"/>
  <rect x="556.7" y="162" width="16.7" height="148" fill="#89b4fa" fill-opacity="0.8"/>
  <rect x="574.3" y="115" width="16.7" height="195" fill="#89b4fa" fill-opacity="0.9"/>
  <rect x="592" y="90" width="16.7" height="220" fill="#89b4fa" fill-opacity="0.95"/>
  <rect x="609.7" y="105" width="16.7" height="205" fill="#89b4fa" fill-opacity="0.9"/>
  <rect x="627.3" y="175" width="16.7" height="135" fill="#89b4fa" fill-opacity="0.7"/>
  <rect x="645" y="240" width="16.7" height="70" fill="#89b4fa" fill-opacity="0.5"/>
  <rect x="662.7" y="275" width="16.7" height="35" fill="#89b4fa" fill-opacity="0.4"/>
  <rect x="680.3" y="292" width="16.7" height="18" fill="#89b4fa" fill-opacity="0.35"/>
  <rect x="698" y="300" width="16.7" height="10" fill="#89b4fa" fill-opacity="0.3"/>
