  <text x="67" y="283" text-anchor="end" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="8">30</text>

  <!-- Arrow: bins -> histogram -->
  <line x1="140" y1="195" x2="195" y2="195" stroke="#585b70" stroke-width="2"/>
  <polygon points="193,190 203,195 193,200" fill="#585b70"/>
  <text x="168" y="185" text-anchor="middle" fill="#585b70" font-family="Arial, Helvetica, sans-serif" font-size="10">each bin</text>
  <text x="168" y="210" text-anchor="middle" fill="#585b70" font-family="Arial, Helvetica, sans-serif" font-size="10">= one bar</text>

  <!-- ========== RIGHT: Histogram ========== -->

  <!-- Axes: plot area x=220..750, y=60..310 -->
  <line x1="220" y1="310" x2="750" y2="310" stroke="#585b70" stroke-width="1.5"/>
  <line x1="220" y1="310" x2="220" y2="60" stroke="#585b70" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="210" y="185" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10" transform="rotate(-90 210 185)">P(bin)</text>

  <!-- X-axis labels -->
  <text x="220" y="328" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10">-30&#xB0;</text>
  <text x="485" y="328" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10">0&#xB0;</text>
  <text x="750" y="328" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="10">+30&#xB0;</text>
  <text x="485" y="348" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="11">Steering Angle (discretized into 30 bins)</text>

