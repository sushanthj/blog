  <rect x="733.3" y="307" width="16.7" height="3" fill="#89b4fa" fill-opacity="0.25"/>

  <!-- Smooth true distribution curve overlay -->
  <path d="M221,304 C240,298 260,285 275,268 C290,245 305,210 315,175 C325,140 332,115 340,100 C348,115 358,155 370,190 C382,225 395,260 415,285 C430,298 450,305 470,302 C485,298 500,285 515,265 C530,240 540,210 550,180 C560,155 572,125 585,100 C595,90 600,92 610,110 C620,140 630,180 645,225 C660,260 675,285 695,298 C715,305 735,308 750,308" fill="none" stroke="#f9e2af" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- Mode labels -->
  <text x="340" y="88" text-anchor="middle" fill="#f38ba8" font-family="Arial, Helvetica, sans-serif" font-size="11">mode 1</text>
  <text x="597" y="78" text-anchor="middle" fill="#f38ba8" font-family="Arial, Helvetica, sans-serif" font-size="11">mode 2</text>

