<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="750" height="200" viewBox="0 0 750 200">
  <rect width="750" height="200" fill="#1e1e2e"/>

  <!-- Step 1: Collect with theta_1 -->
  <rect x="30" y="50" width="160" height="60" rx="8" ry="8" fill="rgba(250,179,135,0.1)" stroke="#fab387" stroke-width="1.5"/>
  <text x="110" y="74" text-anchor="middle" fill="#fab387" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">Collect data</text>
  <text x="110" y="96" text-anchor="middle" fill="#a6adc8" font-family="monospace" font-size="11">states, actions, rewards</text>

  <text x="110" y="130" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="11">using policy &#x3B8;&#x2081;</text>

  <!-- Arrow -->
  <line x1="195" y1="80" x2="245" y2="80" stroke="#585b70" stroke-width="1.5"/>
  <polygon points="245,76 253,80 245,84" fill="#585b70"/>

  <!-- Step 2: Gradient step -->
  <rect x="258" y="50" width="120" height="60" rx="8" ry="8" fill="rgba(166,227,161,0.1)" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="318" y="74" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">loss.backward()</text>
  <text x="318" y="94" text-anchor="middle" fill="#a6adc8" font-family="monospace" font-size="11">&#x3B8;&#x2081; &#x2192; &#x3B8;&#x2082;</text>

  <!-- Arrow -->
  <line x1="383" y1="80" x2="433" y2="80" stroke="#585b70" stroke-width="1.5"/>
  <polygon points="433,76 441,80 433,84" fill="#585b70"/>

  <!-- Step 3: The problem -->
  <rect x="446" y="35" width="270" height="90" rx="8" ry="8" fill="rgba(243,139,168,0.08)" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="581" y="58" text-anchor="middle" fill="#f38ba8" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">Now what?</text>
  <text x="581" y="80" text-anchor="middle" fill="#a6adc8" font-family="Arial, Helvetica, sans-serif" font-size="11">Data came from &#x3B8;&#x2081;, but we now have &#x3B8;&#x2082;.</text>
  <text x="581" y="100" text-anchor="middle" fill="#f38ba8" font-family="Arial, Helvetica, sans-serif" font-size="11">Throw away the data and recollect?</text>
  <text x="581" y="116" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="11">Or reuse it with importance weights?</text>

  <!-- Bottom note -->
  <text x="375" y="165" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="11">On-policy = recollect every time (wasteful).</text>
  <text x="375" y="182" text-anchor="middle" fill="#89b4fa" font-family="Arial, Helvetica, sans-serif" font-size="11">Off-policy = reuse with correction (importance sampling).</text>
</svg>
