<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#1e1e2e"/>

  <defs>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#89b4fa"/>
    </marker>
    <marker id="aPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f38ba8"/>
    </marker>
  </defs>

  <!-- Step 1: Run policy (blue box) -->
  <rect x="80" y="90" width="260" height="80" rx="12" ry="12" fill="rgba(137,180,250,0.12)" stroke="#89b4fa" stroke-width="2.5"/>
  <text x="210" y="122" text-anchor="middle" fill="#89b4fa" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold">1. Run policy &#x03C0;&#x03B8;</text>
  <text x="210" y="148" text-anchor="middle" fill="#a6adc8" font-family="Arial, Helvetica, sans-serif" font-size="13">Collect batch of trajectories</text>

  <!-- Top arrow: Step 1 → Step 2 -->
  <path d="M340,110 C420,110 420,110 450,110" fill="none" stroke="#585b70" stroke-width="2"/>
  <line x1="340" y1="110" x2="450" y2="110" stroke="#585b70" stroke-width="2" marker-end="url(#aBlue)"/>

  <!-- Step numbers on arrow -->
  <text x="395" y="100" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="11">trajectories</text>

  <!-- Step 2: Improve policy (pink box) -->
  <rect x="460" y="90" width="260" height="80" rx="12" ry="12" fill="rgba(243,139,168,0.12)" stroke="#f38ba8" stroke-width="2.5"/>
  <text x="590" y="118" text-anchor="middle" fill="#f38ba8" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold">2. Estimate &#x2207;J(&#x03B8;)</text>
  <text x="590" y="148" text-anchor="middle" fill="#a6adc8" font-family="Arial, Helvetica, sans-serif" font-size="13">3. Update &#x03B8; &#x2190; &#x03B8; + &#x03B1;&#x2207;J</text>

  <!-- Bottom curved arrow: Step 2 back to Step 1 -->
  <path d="M590,170 C590,250 210,250 210,170" fill="none" stroke="#a6e3a1" stroke-width="2.5" marker-end="url(#aBlue)"/>
  <text x="400" y="245" text-anchor="middle" fill="#a6e3a1" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">Repeat with improved policy</text>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#cdd6f4" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold">The Training Loop</text>
  <text x="400" y="62" text-anchor="middle" fill="#7f849c" font-family="Arial, Helvetica, sans-serif" font-size="12">Each iteration: collect data, compute gradient, update policy</text>
</svg>
