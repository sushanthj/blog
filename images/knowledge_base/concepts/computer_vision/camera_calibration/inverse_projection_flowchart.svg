<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 330">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="465" y="30" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">Inverse Projection Pipeline (2D → 3D)</text>

  <!-- ── Unknown Depth Row ── -->
  <text x="20" y="78" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Unknown Depth:</text>

  <!-- Box 1: Pixel Space -->
  <rect x="20" y="95" width="118" height="52" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="79" y="117" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0369a1" text-anchor="middle">Pixel Space</text>
  <text x="79" y="136" font-family="monospace" font-size="11" fill="#333" text-anchor="middle">(x, y)</text>

  <!-- Arrow 1: K⁻¹ -->
  <line x1="138" y1="121" x2="178" y2="121" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="158" y="114" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">K⁻¹</text>

  <!-- Box 2: Distorted Space -->
  <rect x="183" y="95" width="125" height="52" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="245" y="114" font-family="sans-serif" font-size="11" font-weight="bold" fill="#be185d" text-anchor="middle">Distorted Space</text>
  <text x="245" y="129" font-family="sans-serif" font-size="9" fill="#78716c" text-anchor="middle">(normalized)</text>
  <text x="245" y="143" font-family="monospace" font-size="10" fill="#333" text-anchor="middle">(x_d, y_d)</text>

  <!-- Arrow 2: undistort -->
  <line x1="308" y1="121" x2="353" y2="121" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="114" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">undistort</text>

  <!-- Box 3: Normalized Space / NDC -->
  <rect x="358" y="95" width="132" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="424" y="114" font-family="sans-serif" font-size="11" font-weight="bold" fill="#b45309" text-anchor="middle">Image Plane (z=1)</text>
  <text x="424" y="128" font-family="sans-serif" font-size="9" fill="#78716c" text-anchor="middle">aka NDC</text>
  <text x="424" y="143" font-family="monospace" font-size="10" fill="#333" text-anchor="middle">(x_n, y_n)</text>

  <!-- Arrow 3: Z=1 -->
  <line x1="490" y1="121" x2="530" y2="121" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="114" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">Z=1</text>

  <!-- Box 4: Ray in Camera Frame -->
  <rect x="535" y="95" width="155" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="612" y="114" font-family="sans-serif" font-size="11" font-weight="bold" fill="#15803d" text-anchor="middle">Ray (Camera Frame)</text>
  <text x="612" y="136" font-family="monospace" font-size="10" fill="#333" text-anchor="middle">[x_n, y_n, 1]</text>

  <!-- Arrow 4: R @ -->
  <line x1="690" y1="121" x2="733" y2="121" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="711" y="114" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">R @</text>

  <!-- Box 5: Ray in World Frame -->
  <rect x="738" y="95" width="165" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="820" y="114" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6d28d9" text-anchor="middle">Ray (World Frame)</text>
  <text x="820" y="136" font-family="monospace" font-size="10" fill="#333" text-anchor="middle">R @ [x_n, y_n, 1]</text>

  <!-- ── Known Depth Row ── -->
  <text x="20" y="196" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Known Depth (Z_c):</text>

  <!-- Box 1: Pixel Space -->
  <rect x="20" y="213" width="118" height="52" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="79" y="235" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0369a1" text-anchor="middle">Pixel Space</text>
  <text x="79" y="254" font-family="monospace" font-size="11" fill="#333" text-anchor="middle">(x, y)</text>

  <!-- Arrow 1: K⁻¹ -->
  <line x1="138" y1="239" x2="178" y2="239" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="158" y="232" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">K⁻¹</text>

  <!-- Box 2: Distorted Space -->
  <rect x="183" y="213" width="125" height="52" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="245" y="232" font-family="sans-serif" font-size="11" font-weight="bold" fill="#be185d" text-anchor="middle">Distorted Space</text>
  <text x="245" y="247" font-family="sans-serif" font-size="9" fill="#78716c" text-anchor="middle">(normalized)</text>
  <text x="245" y="261" font-family="monospace" font-size="10" fill="#333" text-anchor="middle">(x_d, y_d)</text>

  <!-- Arrow 2: undistort -->
  <line x1="308" y1="239" x2="353" y2="239" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="232" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">undistort</text>

  <!-- Box 3: Normalized Space / NDC -->
  <rect x="358" y="213" width="132" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="424" y="232" font-family="sans-serif" font-size="11" font-weight="bold" fill="#b45309" text-anchor="middle">Image Plane (z=1)</text>
  <text x="424" y="246" font-family="sans-serif" font-size="9" fill="#78716c" text-anchor="middle">aka NDC</text>
  <text x="424" y="261" font-family="monospace" font-size="10" fill="#333" text-anchor="middle">(x_n, y_n)</text>

  <!-- Arrow 3: × Z_c -->
  <line x1="490" y1="239" x2="530" y2="239" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="232" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">× Z_c</text>

  <!-- Box 4: Point in Camera Frame -->
  <rect x="535" y="213" width="155" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="612" y="232" font-family="sans-serif" font-size="11" font-weight="bold" fill="#15803d" text-anchor="middle">Point (Camera Frame)</text>
  <text x="612" y="254" font-family="monospace" font-size="9" fill="#333" text-anchor="middle">[Z_c·x_n, Z_c·y_n, Z_c]</text>

  <!-- Arrow 4: inv([R|t]) -->
  <line x1="690" y1="239" x2="733" y2="239" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="711" y="232" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">inv([R|t])</text>

  <!-- Box 5: Point in World Frame -->
  <rect x="738" y="213" width="165" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="820" y="232" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6d28d9" text-anchor="middle">Point (World Frame)</text>
  <text x="820" y="254" font-family="monospace" font-size="10" fill="#333" text-anchor="middle">(X, Y, Z)</text>

  <!-- Note -->
  <text x="465" y="318" font-family="sans-serif" font-size="11" fill="#666" text-anchor="middle" font-style="italic">Note: Without depth, we only recover a ray direction. With depth Z_c, we recover the actual 3D point.</text>
</svg>
